<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Login Admin - Mina Selatan</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700;900&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<style>
  body{
    background-color: #FFFFFF;
    color: #000000;
    font-family: "Plus Jakarta Sans", sans-serif;
    }
  h1, h2{ 
    font-family: "Fraunces", serif; 
    font-weight: 700; 
    }
  .text-brand{ 
    color: #009A4C; 
    }
  .btn-brand{
    background-color: #009A4C;
    color: #fff;
    border-radius: 999px;
  }
  .btn-brand:hover{ 
    background-color: #009A4C; 
    color: #fff;
 }
  .login-card{
    border-radius: 18px;
    border: 1px solid #E0E0E0;
  }
  .login-icon{
    width: 64px; height: 64px; border-radius: 50%;
    background-color: #009A4C; color: #FFF538;
    display: flex; align-items: center; justify-content: center;
    margin-inline: auto;
  }
   h1.h4{ 
    font-size: clamp(1.4rem, 3vw, 1.6rem); 
  }
  .py-fluid{ 
    padding-block: clamp(44px, 5vw, 52px); 
    }
</style>
</head>
<body>
<main class="d-flex align-items-center justify-content-center min-vh-100 py-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-11 col-sm-8 col-md-6 col-lg-4">
        <div class="card login-card shadow-sm p-4">
          <header class="text-center mb-4">
            <div class="login-icon mb-3"><i class="bi bi-tree-fill fs-3"></i></div>
            <h1 class="h4 mb-0">Login Admin</h1>
            <p class="text-secondary small mb-0">Mina Selatan</p>
          </header>
          <div id="loginAlert" class="alert alert-danger d-none" role="alert">
            Username atau password salah. Gunakan admin / admin123.
          </div>
          <form id="loginForm" novalidate>
            <div class="mb-3">
              <label for="username" class="form-label">Username</label>
              <input type="text" class="form-control" id="username" placeholder="admin" required>
            </div>
            <div class="mb-3">
              <label for="password" class="form-label">Kata Sandi</label>
              <input type="password" class="form-control" id="password" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;" required>
            </div>
            <button type="submit" class="btn btn-brand w-100">Masuk</button>
          </form>
          <p class="text-center small text-secondary mt-3 mb-0">Demo: <code>admin</code> / <code>admin123</code></p>
        </div>
        <footer class="text-center small mt-3"><a href="indexFix.html" class="text-brand">&larr; Kembali ke beranda</a></footer>
      </div>
    </div>
  </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
document.getElementById("loginForm").addEventListener("submit", function(e){
    e.preventDefault();
    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;
    if(username === "admin" && password === "admin123"){
        window.location.href = "dashboardFix.html";
    }else{
        document.getElementById("loginAlert").classList.remove("d-none");
    }
});
</script>
</body>
</html>
</body>
</html>
